<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="paper" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#F1E8D0"/>
      <line x1="0" y1="3.5" x2="4" y2="3.5" stroke="rgba(90,74,53,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Fond papier ivoire -->
  <rect width="1200" height="630" fill="url(#paper)"/>

  <!-- Bordures journal -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#141414" stroke-width="2"/>
  <rect x="50" y="50" width="1100" height="530" fill="none" stroke="#141414" stroke-width="1"/>

  <!-- Ornement haut -->
  <text x="600" y="115" font-family="Georgia,serif" font-size="20" font-style="italic" fill="#5A4A35" text-anchor="middle" letter-spacing="6">— FONDÉ EN MMXXVI —</text>

  <!-- Titre principal -->
  <text x="600" y="225" font-family="Georgia,serif" font-size="88" font-weight="400" fill="#141414" text-anchor="middle" letter-spacing="4">LE JOURNAL DES</text>
  <text x="600" y="320" font-family="Georgia,serif" font-size="100" font-weight="400" fill="#141414" text-anchor="middle" letter-spacing="6">INVESTISSEURS</text>

  <!-- Filet double -->
  <line x1="200" y1="360" x2="1000" y2="360" stroke="#141414" stroke-width="3"/>
  <line x1="200" y1="370" x2="1000" y2="370" stroke="#141414" stroke-width="1"/>

  <!-- Baseline italique -->
  <text x="600" y="425" font-family="Georgia,serif" font-size="28" font-style="italic" fill="#5A4A35" text-anchor="middle">« Pecunia non olet, sed ratio computandi olet »</text>

  <!-- Sous-titre -->
  <text x="600" y="490" font-family="Georgia,serif" font-size="22" fill="#141414" text-anchor="middle" letter-spacing="2">Quotidien indépendant d'analyse financière</text>

  <!-- Ornement bas -->
  <text x="600" y="555" font-family="Georgia,serif" font-size="32" fill="#5A4A35" text-anchor="middle" letter-spacing="20">·  ·  ·  ·  ·</text>
</svg>
